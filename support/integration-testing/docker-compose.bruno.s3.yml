networks:
  main:

x-bruno-service: &bruno-service
  image: node:24.14.1-bookworm
  pull_policy: 'missing'
  volumes:
    - '../../.tmp/junit/backend-bruno:/opt/junit/backend-bruno'
    - '../../test/bruno/bruno.json:/opt/bruno-tests/bruno.json'
    - '../../test/bruno/package.json:/opt/bruno-tests/package.json'
    - '../../test/bruno/package-lock.json:/opt/bruno-tests/package-lock.json'
    - '../../test/bruno/attachment.png:/opt/bruno-tests/attachment.png'
    - '../../test/bruno/environments:/opt/bruno-tests/environments'
    - '../../test/bruno/7 - S3 Attachment Storage:/opt/bruno-tests/7 - S3 Attachment Storage'
    - '../../test/bruno/bruno-helpers.js:/opt/bruno-tests/bruno-helpers.js'
    - '../../support/integration-testing/run-bruno-s3.sh:/opt/bruno-tests/run-bruno-s3.sh'
    - '../../test/bruno/validate-bruno-files.js:/opt/bruno-tests/validate-bruno-files.js'
  working_dir: /opt/bruno-tests
  stop_grace_period: 30m
  networks:
    main:
      aliases:
        - bruno
  init: true
  entrypoint:
    - bash
    - /opt/bruno-tests/run-bruno-s3.sh

x-rbportal-env: &rbportal-env
  - NODE_ENV=integrationtest
  - PORT=1500
  - NODE_OPTIONS=--max-old-space-size=1024
  - 'RBPORTAL_REMOTE_DEBUG=${RBPORTAL_REMOTE_DEBUG:-}'
  - sails_redbox__apiKey=c8e844fc-8550-497f-b970-7900ec8741ca
  - sails_record__baseUrl_redbox=http://redbox:9000/redbox
  - sails_record__baseUrl_mint=http://203.101.226.160/mint
  - LOAD_DEFAULT_FORMS=true
  - sails_brandingConfigurationDefaults__auth__local__default__token=d077835a-696b-4728-85cf-3ffd57152b1e
  - sails_security__csrf=false
  - sails_storage__serviceName=mongostorageservice
  - sails_record__datastreamService=standarddatastreamservice
  - sails_storage__defaultDisk=primary
  - sails_storage__stagingDisk=staging
  - sails_storage__primaryDisk=primary
  - sails_storage__keyPrefix=attachments/
  - sails_storage__disks__staging__driver=fs
  - sails_storage__disks__staging__config__root=/attachments/staging
  - sails_storage__disks__primary__driver=s3
  - sails_storage__disks__primary__config__key=s3mock
  - sails_storage__disks__primary__config__secret=s3mock
  - sails_storage__disks__primary__config__bucket=test-aws-redbox-attachments
  - sails_storage__disks__primary__config__region=us-east-1
  - sails_storage__disks__primary__config__endpoint=http://s3mock:9090
  - sails_storage__disks__primary__config__forcePathStyle=true
  - sails_storage__disks__primary__config__visibility=private
  - 'BRUNO_POST_SLEEP_SECONDS=${BRUNO_POST_SLEEP_SECONDS:-30}'

x-rbportal-depends: &rbportal-depends
  keycloak:
    condition: 'service_healthy'
  mongodb:
    condition: 'service_healthy'
  solr:
    condition: 'service_healthy'
  email:
    condition: 'service_healthy'
  s3mock:
    condition: 'service_healthy'

x-rbportal-service: &rbportal-service
  image: ${RBPORTAL_IMAGE:-qcifengineering/redbox-portal:develop}
  pull_policy: 'never'
  user: root
  volumes:
    - '../../test:/opt/redbox-portal/test'
    - '../../support:/opt/redbox-portal/support'
    - '../../coverage/bruno-s3:/opt/redbox-portal/coverage/bruno-s3'
    - '../../app.integrationtest.js:/opt/redbox-portal/app.integrationtest.js'
    - '../../.tmp/attachments:/attachments'
    - '../../test/resources/config/emailnotification.js:/opt/redbox-portal/config/emailnotification.js'
    - '../resources/development/bootstrap-data:/opt/redbox-portal/bootstrap-data:ro'
  stop_grace_period: 30m
  healthcheck:
    test: ['CMD-SHELL', 'curl http://localhost:1500/default/rdmp/home']
    interval: '10s'
    timeout: '5s'
    retries: 30
    start_period: '600s'
  depends_on: *rbportal-depends
  expose:
    - '1500'
    - '1599'
  environment: *rbportal-env
  networks:
    main:
      aliases:
        - redboxportal
  init: true
  entrypoint:
    - bash
    - /opt/redbox-portal/support/integration-testing/run-bruno-s3-redbox.sh

services:
  bruno:
    <<: *bruno-service
    profiles: [ci]
    depends_on:
      redboxportal:
        condition: service_healthy
  bruno-mount:
    <<: *bruno-service
    profiles: [mount]
    depends_on:
      redboxportal-mount:
        condition: service_healthy
  redboxportal:
    <<: *rbportal-service
    profiles: [ci]
  redboxportal-mount:
    <<: *rbportal-service
    profiles: [mount]
    image: ${RBPORTAL_IMAGE:-qcifengineering/redbox-portal:develop}
    volumes:
      - '../../:/opt/redbox-portal:delegated'
      - '../../.tmp/attachments:/attachments'
      - '../../test/resources/config/emailnotification.js:/opt/redbox-portal/config/emailnotification.js'
      - '../../test/resources/api/services/empty-service.js:/opt/redbox-portal/api/services/JCUTriggerService.js'
      - '../../test/resources/api/services/empty-service.js:/opt/redbox-portal/api/services/MetadataOutputsTriggerService.js'
      - '../../test/resources/api/services/empty-service.js:/opt/redbox-portal/api/services/pdfservice.js'
      - '../../test/resources/api/controllers/empty-controller.js:/opt/redbox-portal/api/controllers/LegacyMappingController.js'
      - '../resources/development/bootstrap-data:/opt/redbox-portal/bootstrap-data:ro'
    healthcheck:
      test: ['CMD-SHELL', 'curl http://localhost:1500/default/rdmp/home']
      interval: '10s'
      timeout: '5s'
      retries: 30
      start_period: '600s'
  mongodb:
    image: mongo:latest
    pull_policy: 'missing'
    networks:
      main:
        aliases:
          - mongodb
    healthcheck:
      test: ['CMD-SHELL', 'echo ''db.runCommand("ping").ok'' | mongosh']
      interval: '10s'
      timeout: '5s'
      retries: 10
      start_period: '30s'
  solr:
    image: solr:latest
    pull_policy: 'missing'
    expose:
      - '8983'
    healthcheck:
      test: ['CMD-SHELL', 'curl http://localhost:8983']
      interval: '10s'
      timeout: '5s'
      retries: 10
      start_period: '30s'
    networks:
      main:
        aliases:
          - solr
    entrypoint:
      - docker-entrypoint.sh
      - solr-precreate
      - redbox
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.6
    pull_policy: 'missing'
    expose:
      - '8080'
    healthcheck:
      test: ['CMD-SHELL', "/usr/bin/bash -c 'true </dev/tcp/127.0.0.1/8080'"]
      interval: '10s'
      timeout: '5s'
      retries: 10
      start_period: '30s'
    volumes:
      - './keycloakdb/import:/opt/keycloak/data/import:ro'
    networks:
      main:
        aliases:
          - keycloak
    command:
      - start-dev
      - --import-realm
  email:
    image: axllent/mailpit:latest
    pull_policy: 'missing'
    expose:
      - '1025'
      - '8025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: '/data/mailpit.db'
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
      TZ: 'Australia/Brisbane'
    volumes:
      - '../../.tmp/email:/data'
    networks:
      main:
        aliases:
          - 'email'
  s3mock:
    image: adobe/s3mock:latest
    pull_policy: 'missing'
    expose:
      - '9090'
    environment:
      COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS: test-aws-redbox-attachments
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:9090/']
      interval: '5s'
      timeout: '5s'
      retries: 20
      start_period: '10s'
    networks:
      main:
        aliases:
          - s3mock
