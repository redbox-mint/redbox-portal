<div class="nq-subeditor">
  <div class="nq-section-header">
    <h6>{{ 'named-query-mappings-heading' | i18next }}</h6>
  </div>
  <p class="text-muted small mb-2">{{ 'named-query-mappings-help' | i18next }}</p>

  <div *ngIf="entries.length > 0" class="table-responsive">
    <table class="table table-sm table-bordered mb-0">
      <thead class="thead-light">
        <tr>
          <th style="width: 35%">{{ 'named-query-mapping-field' | i18next }}</th>
          <th>{{ 'named-query-mapping-template' | i18next }}</th>
          <th style="width: 70px">{{ 'record-table-results-table-header-actions' | i18next }}</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let entry of entries; trackBy: trackById">
          <td>
            <input type="text" class="form-control form-control-sm"
                   [ngModel]="entry.key"
                   (ngModelChange)="onKeyChange(entry, $event)">
          </td>
          <td>
            <input type="text" class="form-control form-control-sm font-monospace"
                   [ngModel]="entry.value"
                   (ngModelChange)="onValueChange(entry, $event)"
                   spellcheck="false">
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-outline-danger" type="button"
                    (click)="removeEntry(entry)">
              {{ 'named-query-remove' | i18next }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <p *ngIf="entries.length === 0" class="text-muted mb-2">{{ 'named-query-mapping-empty' | i18next }}</p>

  <div class="d-flex flex-wrap nq-add-row mt-2">
    <input type="text" class="form-control form-control-sm nq-add-grow" [(ngModel)]="newKey"
           [attr.placeholder]="'named-query-mapping-field-placeholder' | i18next">
    <input type="text" class="form-control form-control-sm nq-add-grow-wide font-monospace" [(ngModel)]="newValue"
           [attr.placeholder]="'named-query-mapping-template-placeholder' | i18next"
           spellcheck="false">
    <button class="btn btn-sm btn-outline-primary" type="button" (click)="addEntry()">
      {{ 'named-query-add' | i18next }}
    </button>
  </div>
</div>
