<div class="card card-body mb-3">
  <div class="mb-3">
    <label class="form-label">Binding Type</label>
    <select class="form-select" [value]="kind" (change)="updateField('kind', $any($event.target).value)">
      @for (bindingKind of bindingKinds; track bindingKind) {
      <option [value]="bindingKind">{{ bindingKind }}</option>
      }
    </select>
  </div>

  @if (kind === 'path') {
  <div class="mb-3">
    <label class="form-label">Record Path</label>
    <input
      class="form-control"
      type="text"
      [value]="value.path || ''"
      (input)="updateField('path', $any($event.target).value)"
    />
  </div>
  } @if (kind === 'handlebars') {
  <div class="mb-3">
    <label class="form-label">Handlebars Template</label>
    <textarea
      class="form-control"
      rows="3"
      [value]="value.template || ''"
      (input)="updateField('template', $any($event.target).value)"
    ></textarea>
  </div>
  } @if (kind === 'jsonata') {
  <div class="mb-3">
    <label class="form-label">JSONata Expression</label>
    <textarea
      class="form-control"
      rows="3"
      [value]="value.expression || ''"
      (input)="updateField('expression', $any($event.target).value)"
    ></textarea>
  </div>
  }

  <div>
    <label class="form-label">Default Value</label>
    <input
      class="form-control"
      type="text"
      [value]="value.defaultValue || ''"
      (input)="updateField('defaultValue', $any($event.target).value)"
    />
  </div>
</div>
