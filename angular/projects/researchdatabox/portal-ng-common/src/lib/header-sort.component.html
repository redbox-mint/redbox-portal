<button type="button" [attr.aria-sort]="sort === 'asc'? 'ascending' : sort === 'desc' ? 'descending' : null" (click)="headerSortClicked()" class="record-table-heading-sort">
  {{title}}
  @if (sort == 'asc') {
    <span class="record-table-heading-sort-icon">
      <i class="fa fa-sort-asc"></i>
    </span>
    }@if (sort == 'desc') {
    <span class="record-table-heading-sort-icon">
      <i class="fa fa-sort-desc"></i>
    </span>
    }@if (!['asc', 'desc'].includes(sort)) {
    <span class="record-table-heading-sort-icon">&nbsp;</span>
  }
</button>
