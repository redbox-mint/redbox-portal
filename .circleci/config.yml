  test-angular:
    parameters:
      angular_app:
        type: string
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-cache-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-cache-{{ arch }}-{{ .Branch }}
            - v1-npm-cache-
      - run:
          name: Install npm dependencies
          command: npm ci --ignore-scripts --strict-peer-deps
      - run:
          name: Compile shared Angular packages
          command: >-
            npm run compile:sails-ng-common:prod
            && source support/build/compileProductionAngular.sh portal-ng-common
            && cd .. && source support/build/compileProductionAngular.sh portal-ng-form-custom
      - run:
          <<: *installCodecov
      - run:
          name: Setup test directories
          command: |
            sudo mkdir -p .tmp/attachments/staging
            sudo chmod -R 777 .
      - run:
          name: Run Angular tests
          no_output_timeout: 30m
          command: |
            chmod +x support/unit-testing/angular/testAngular.sh
            source support/unit-testing/angular/testAngular.sh "<< parameters.angular_app >>"
      - store_test_results:
          path: .tmp/junit
      - save_cache:
          key: v1-npm-cache-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
  test-sails-ng-common:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          <<: *installCodecov
      - run:
          name: Install packages
          command: |
            npm install --no-save --ignore-scripts
            cd ./packages/sails-ng-common
            npm ci --include=dev
      - run:
          name: Run Mocha tests
          no_output_timeout: 30m
          command: |
            cd ./packages/sails-ng-common
            npm run pretest
            npx nyc --no-clean --report-dir ./coverage/sails-ng-common --reporter=lcov --exclude-after-remap=false \
              npx mocha --config test/unit/.mocharc.js --exit dist/test/unit/**/*.test.js
      - run:
          name: Upload Mocha code coverage
          command: |
            cd ./packages/sails-ng-common
            /tmp/.codecov-cli/codecov --verbose upload-process --fail-on-error --disable-search \
             --token "${CODECOV_TOKEN}" --name "job-${CIRCLE_BUILD_NUM}-${CIRCLE_TAG:-$CIRCLE_BRANCH}" \
             --flag "backend-sails-ng-common" --file "./coverage/sails-ng-common/lcov.info" --branch "${CIRCLE_TAG:-$CIRCLE_BRANCH}"
          when: always
      - store_test_results:
          path: packages/sails-ng-common/support/junit
  test-redbox-core:
    machine:
      image: ubuntu-2204:current
    resource_class: large
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - run:
          <<: *installCodecov
      - run:
          name: Install required ReDBox dependencies
          command: |
            npm install --no-save --ignore-scripts && npm run compile:sails-ng-common && npm run compile:raido && npm run compile:rva
      - run:
          name: Install packages
          command: |
            cd ./packages/redbox-core
            npm ci --include=dev
      - run:
          name: Run Mocha tests with coverage
          no_output_timeout: 30m
          command: |
            cd ./packages/redbox-core
            mkdir -p support/junit
            nvm install && npx nyc --no-clean --report-dir ./coverage/redbox-core --reporter=lcov --exclude-after-remap=false \
              npx mocha --config .mocharc.js --exit test/**/*.test.ts
      - run:
          name: Upload redbox-core code coverage
          command: |
            cd ./packages/redbox-core
            /tmp/.codecov-cli/codecov --verbose upload-process --fail-on-error --disable-search \
             --token "${CODECOV_TOKEN}" --name "job-${CIRCLE_BUILD_NUM}-${CIRCLE_TAG:-$CIRCLE_BRANCH}" \
             --flag "backend-redbox-core" --file "./coverage/redbox-core/lcov.info" --branch "${CIRCLE_TAG:-$CIRCLE_BRANCH}"
          when: always
      - store_test_results:
          path: packages/redbox-core/support/junit
  test-redbox-dev-tools-cli:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout
      - run:
          <<: *installCodecov
      - run:
          name: Install root dependencies
          command: |
            nvm install
            npm install --no-save --ignore-scripts
      - run:
          name: Compile shared packages
          command: |
            nvm install
            npm run compile:raido && npm run compile:rva && npm run compile:sails-ng-common && npm run compile:core
      - run:
          name: Install redbox-dev-tools dependencies
          command: |
            nvm install
            cd ./packages/redbox-dev-tools
            npm ci --include=dev
      - run:
          name: Run hook-kit CLI tests with coverage
          no_output_timeout: 30m
          command: |
            nvm install
            cd ./packages/redbox-dev-tools
            mkdir -p coverage/redbox-dev-tools
            mkdir -p support/junit
            status=0
            TS_NODE_PROJECT=test/tsconfig.json ../../node_modules/.bin/nyc --no-clean --report-dir ./coverage/redbox-dev-tools --reporter=lcov --exclude-after-remap=false \
              npm test || status=$?
            if [ "$status" -ne 0 ]; then
              echo "redbox-dev-tools tests failed with status $status"
              echo "----- support/junit/mocha.xml -----"
              cat support/junit/mocha.xml || true
              echo "----- re-running with spec reporter for diagnostics -----"
              CI=false TS_NODE_PROJECT=test/tsconfig.json node -r ts-node/register ./node_modules/mocha/bin/_mocha --exit test/**/*.test.ts || true
            fi
            exit "$status"
      - run:
          name: Upload redbox-dev-tools CLI code coverage
          command: |
            cd ./packages/redbox-dev-tools
            /tmp/.codecov-cli/codecov --verbose upload-process --fail-on-error --disable-search \
             --token "${CODECOV_TOKEN}" --name "job-${CIRCLE_BUILD_NUM}-${CIRCLE_TAG:-$CIRCLE_BRANCH}" \
             --flag "backend-redbox-dev-tools-cli" --file "./coverage/redbox-dev-tools/lcov.info" --branch "${CIRCLE_TAG:-$CIRCLE_BRANCH}"
          when: always
      - store_test_results:
          path: packages/redbox-dev-tools/support/junit
