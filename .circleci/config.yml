      - run:
          name: Install npm dependencies
          command: npm ci --ignore-scripts --strict-peer-deps
      - run:
          <<: *installCodecov
      - run:
          name: Install storage-mongo package dependencies
          command: |
            cd ./packages/sails-hook-redbox-storage-mongo
            npm ci --include=dev --ignore-scripts --strict-peer-deps
      - run:
          name: Compile storage-mongo test dependencies
          command: |
            npm run compile:raido
            npm run compile:rva
            npm run compile:sails-ng-common
            npm run compile:core
      - run:
          name: Run storage-mongo package tests with coverage
          command: |
            cd ./packages/sails-hook-redbox-storage-mongo
            npm run test:coverage
      - run:
          name: Upload storage-mongo code coverage
          command: |
            cd ./packages/sails-hook-redbox-storage-mongo
            /tmp/.codecov-cli/codecov --verbose upload-process --fail-on-error --disable-search \
             --token "${CODECOV_TOKEN}" --name "job-${CIRCLE_BUILD_NUM}-${CIRCLE_TAG:-$CIRCLE_BRANCH}" \
             --flag "backend-storage-mongo" --file "./coverage/storage-mongo/lcov.info" --branch "${CIRCLE_TAG:-$CIRCLE_BRANCH}"
          when: always
      - save_cache:
          key: v1-npm-cache-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
  lint-redbox-core:
    docker:
      - image: 'cimg/node:24.14.1'
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-cache-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-cache-{{ arch }}-{{ .Branch }}
            - v1-npm-cache-
      - run:
          name: Install redbox-core dependencies
          command: |
            cd ./packages/redbox-core
            npm ci --include=dev
      - run:
          name: Run lint for redbox-core
          command: |
            cd ./packages/redbox-core
            npm run lint
