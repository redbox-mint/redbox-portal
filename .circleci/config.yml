  npm-publish-backend:
    parameters:
      release_kind:
        type: enum
        enum:
          - beta
          - release
      release_version:
        type: string
        default: ""
      dist_tag:
        type: string
        default: "latest"
    docker:
      - image: 'cimg/node:24.14.1'
    resource_class: medium
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-npm-cache-{{ arch }}-{{ .Branch }}-{{ checksum "package-lock.json" }}
            - v1-npm-cache-{{ arch }}-{{ .Branch }}
            - v1-npm-cache-
      - run:
          name: Install npm dependencies
          command: npm ci --ignore-scripts --strict-peer-deps
      - run:
          name: Get npm OIDC token
          command: |
            OIDC_TOKEN="$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')"
            printf 'export NPM_ID_TOKEN=%q\n' "$OIDC_TOKEN" >> "$BASH_ENV"
      - run:
          name: Publish backend npm packages
          command: |
            source "$BASH_ENV"
            CIRCLE_PIPELINE_NUMBER="<< pipeline.number >>" \
            NPM_RELEASE_KIND="<< parameters.release_kind >>" \
            NPM_PUBLISH_VERSION="<< parameters.release_version >>" \
            NPM_DIST_TAG="<< parameters.dist_tag >>" \
            bash support/build/npm-publish-backend-packages.sh
  deploy:
    docker:
      - image: 'cimg/node:24.14.1'
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: /tmp
      - run:
          name: Load and tag tested Docker image
          command: |
            docker load -i /tmp/docker-images/redbox-portal-test.tar
            echo "${DOCKER_PASS}" | docker login --username "${DOCKER_USER}" --password-stdin

            # Determine the tag
            if [[ -n "${CIRCLE_BRANCH:-}" ]]; then
              export TAG="$CIRCLE_BRANCH"
            elif [[ -n "${CIRCLE_TAG:-}" ]]; then
              export TAG="$CIRCLE_TAG"
            else
              export TAG="local"
            fi
            export DEPLOY_TAG=${TAG//\//-}
            export REPO=${REPO:-qcifengineering/redbox-portal}
            # Tag and push the tested amd64 image
            docker tag redbox-portal:test "${REPO}:${DEPLOY_TAG}-amd64"
            docker push "${REPO}:${DEPLOY_TAG}-amd64"
      - run:
          name: Upload container to Nexus
          command: |
            echo $CIRCLE_BRANCH
            npm pack
            PACKAGE_VERSION=$(cat package.json \
            | grep version \
            | head -1 \
            | awk -F: '{ print $2 }' \
            | sed 's/[", \t]//g')
            RBPORTAL_FILENAME=$(ls redbox-portal-*.tgz)
            curl -v -u $MAVEN_USER:$MAVEN_PASSWORD --upload-file $RBPORTAL_FILENAME "https://nexus-prod.redboxresearchdata.com.au/nexus/repository/maven-snapshots/au/edu/qcif/redbox-portal/${PACKAGE_VERSION}-SNAPSHOT/redbox-portal-${PACKAGE_VERSION}-SNAPSHOT.tgz"
